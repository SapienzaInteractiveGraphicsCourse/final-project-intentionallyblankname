<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Basketball</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    .hidden { display: none; }
    #hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: monospace;
      font-size: 18px;
      pointer-events: none;
      text-align: center;
      text-shadow: 0 0 8px #000;
    }

    /* Pannelli laterali (debug/camera): stesso box, posizione/dimensioni
       diverse per elemento */
    .hud-panel {
      position: fixed;
      top: 16px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      padding: 12px 16px;
      border: 1px solid #444;
      border-radius: 4px;
    }
    .hud-panel h3 {
      margin: 0 0 10px;
      font-size: 13px;
      letter-spacing: 1px;
      color: #e8942c;
    }
    #debug-panel {
      left: 16px;
      min-width: 240px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
    }
    #debug-panel label {
      display: block;
      margin-bottom: 4px;
    }
    #debug-panel input[type="range"] {
      width: 100%;
    }
    #debug-panel button {
      display: block;
      width: 100%;
      background: #2a2a2e;
      color: #fff;
      border: 1px solid #555;
      border-radius: 3px;
      font-family: monospace;
      font-size: 12px;
      padding: 6px 8px;
      margin-top: 8px;
      cursor: pointer;
      text-align: left;
    }
    #debug-panel button:hover { background: #3a3a40; }
    .component-panel {
      margin: 4px 0 4px 10px;
      padding: 8px 10px;
      border-left: 2px solid #444;
    }
    #copy-config-btn { color: #e8942c; text-align: center; }
    #copy-config-feedback {
      font-size: 11px;
      color: #6ec26e;
      text-align: center;
      height: 14px;
      margin-top: 4px;
    }
    #camera-panel {
      right: 16px;
      min-width: 180px;
      pointer-events: none;
    }
    #camera-panel div { margin-bottom: 2px; }

    /* "Pillole" in basso (mode/dash): stesso box, colore/dimensione testo
       diversi per elemento */
    .hud-pill {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      font-family: monospace;
      letter-spacing: 1px;
      border: 1px solid #444;
      border-radius: 4px;
      pointer-events: none;
    }
    #mode-indicator {
      bottom: 16px;
      color: #e8942c;
      font-size: 13px;
      padding: 6px 14px;
    }
    #dash-panel {
      bottom: 54px;
      color: #fff;
      font-size: 11px;
      padding: 5px 10px;
    }
    #dash-bar-track {
      width: 140px;
      height: 8px;
      background: #222;
      border-radius: 3px;
      margin-top: 3px;
      overflow: hidden;
    }
    #dash-bar-fill {
      height: 100%;
      width: 100%;
      background: #888;
      transition: background-color 0.15s;
    }
    #dash-bar-fill.ready { background: #6ec26e; }
  </style>
</head>
<body>
  <div id="hint">Click per entrare<br><small>WASD · Space/Shift · Mouse · P per debug · M per modalità</small></div>
  <div id="mode-indicator" class="hud-pill">MODE: SPECTATE</div>
  <div id="dash-panel" class="hud-pill hidden">
    DASH
    <div id="dash-bar-track"><div id="dash-bar-fill"></div></div>
  </div>
  <div id="debug-panel" class="hud-panel hidden">
    <h3>DEBUG</h3>
    <div id="manipulator-scale-container"></div>

    <button id="manipulator-config-btn">Manipulator Config ▸</button>
    <div id="manipulator-config" class="component-panel hidden"></div>

    <button id="copy-config-btn">Copy config</button>
    <div id="copy-config-feedback"></div>
  </div>
  <div id="camera-panel" class="hud-panel hidden">
    <h3>CAMERA</h3>
    <div>X: <span id="cam-x"></span></div>
    <div>Y: <span id="cam-y"></span></div>
    <div>Z: <span id="cam-z"></span></div>
    <div>Pitch: <span id="cam-pitch"></span>°</div>
    <div>Yaw: <span id="cam-yaw"></span>°</div>
    <div>Roll: <span id="cam-roll"></span>°</div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
